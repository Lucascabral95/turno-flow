name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json
      - run: rm -f package-lock.json
      - run: npm install
      - run: npm --workspace apps/api run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json
      - run: rm -f package-lock.json
      - run: npm install
      - run: npm --workspace apps/api run prisma:generate
      - run: npm --workspace apps/api run build
      - run: npm --workspace apps/web run build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/worker/go.mod
          cache: true
      - run: go test ./...
      - run: go build ./cmd/worker
      - run: go mod tidy && git diff --exit-code go.mod go.sum

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json
      - run: rm -f package-lock.json
      - run: npm install
      - run: npm --workspace apps/api run prisma:generate
      - run: npm --workspace apps/api run test:integration
