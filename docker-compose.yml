services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turnoflow}
      POSTGRES_USER: ${POSTGRES_USER:-turnoflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turnoflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turnoflow} -d ${POSTGRES_DB:-turnoflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-turnoflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-turnoflow}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-turnoflow}:${POSTGRES_PASSWORD:-turnoflow}@postgres:5432/${POSTGRES_DB:-turnoflow}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-turnoflow}:${RABBITMQ_DEFAULT_PASS:-turnoflow}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      EMAIL_FROM: ${EMAIL_FROM:-TurnoFlow <noreply@turnoflow.local>}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-json}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      SERVER_API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    build:
      context: ./apps/worker
    restart: on-failure
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-turnoflow}:${POSTGRES_PASSWORD:-turnoflow}@postgres:5432/${POSTGRES_DB:-turnoflow}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-turnoflow}:${RABBITMQ_DEFAULT_PASS:-turnoflow}@rabbitmq:5672/
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      EMAIL_FROM: ${EMAIL_FROM:-TurnoFlow <noreply@turnoflow.local>}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-json}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
