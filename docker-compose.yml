services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turnoflow}
      POSTGRES_USER: ${POSTGRES_USER:-turnoflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turnoflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turnoflow} -d ${POSTGRES_DB:-turnoflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-turnoflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-turnoflow}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-turnoflow}:${POSTGRES_PASSWORD:-turnoflow}@postgres:5432/${POSTGRES_DB:-turnoflow}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-turnoflow}:${RABBITMQ_DEFAULT_PASS:-turnoflow}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CALENDAR_TOKEN_ENCRYPTION_KEY: ${CALENDAR_TOKEN_ENCRYPTION_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-TurnoFlow <noreply@turnoflow.local>}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-json}
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-http://localhost:3001/calendar-connections/google/callback}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-change-me-calendar-state-secret}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        SERVER_API_URL: http://api:3001
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      SERVER_API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
    restart: on-failure
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-turnoflow}:${POSTGRES_PASSWORD:-turnoflow}@postgres:5432/${POSTGRES_DB:-turnoflow}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-turnoflow}:${RABBITMQ_DEFAULT_PASS:-turnoflow}@rabbitmq:5672/
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-8}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      CALENDAR_TOKEN_ENCRYPTION_KEY: ${CALENDAR_TOKEN_ENCRYPTION_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-TurnoFlow <noreply@turnoflow.local>}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-json}
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_TIMEOUT_SECONDS: ${GOOGLE_CALENDAR_TIMEOUT_SECONDS:-10}
      WORKER_MODE: ${WORKER_MODE:-all}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      REMINDER_BATCH_SIZE: ${REMINDER_BATCH_SIZE:-25}
      ATTENDANCE_BATCH_SIZE: ${ATTENDANCE_BATCH_SIZE:-25}
      MAX_NOTIFICATION_ATTEMPTS: ${MAX_NOTIFICATION_ATTEMPTS:-3}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-60}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      SMTP_USER: ${SMTP_USER:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
